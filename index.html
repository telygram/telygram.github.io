<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Premium Blog</title>
  <meta name="description" content="Premium blog template GitHub Pages SEO">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <nav id="navbar" class="navbar navbar-expand-lg navbar-light bg-white fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">MyBlog</a>

      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">☰</button>

      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/page.html">About</a></li>
        </ul>

        <button id="darkToggle" class="btn btn-sm btn-dark ms-3">🌙</button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero text-center">
    <div class="container">
      <h1 class="fw-bold">Premium Blog Template</h1>
      <p>Fast, SEO, GitHub Pages Ready</p>
    </div>
  </section>

  <div class="container mt-4">
    <div class="row">

      <!-- POSTS -->
      <div class="col-lg-8">
        <div id="post-list" class="row"></div>

        <nav>
          <ul class="pagination" id="pagination"></ul>
        </nav>
      </div>

      <!-- SIDEBAR -->
      <div class="col-lg-4">
        <div class="sidebar">

          <input type="text" id="search" placeholder="Search..." class="form-control mb-3">

          <h5>Recent</h5>
          <ul id="recent"></ul>

          <h5>Categories</h5>
          <ul id="cats"></ul>

        </div>
      </div>

    </div>
  </div>

  <button id="topBtn">↑</button>

  <script src="assets/js/main.js"></script>
</body>

</html>
